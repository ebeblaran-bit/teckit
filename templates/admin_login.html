<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TICK.IT — Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .login-card {
            background: rgba(0,0,0,0.85);
            border: 2px solid #300000;
            border-radius: 20px;
            padding: 48px 44px;
            width: 100%;
            max-width: 400px;
        }
        .login-logo {
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 6px;
        }
        .login-logo span { color: #CE0000; }
        .login-sub {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-bottom: 36px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #888;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control {
            width: 100%;
            height: 46px;
            background: rgba(255,255,255,0.05);
            border: 2px solid #300000;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            padding: 0 16px;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        .form-control:focus { border-color: #CE0000; }
        .form-control::placeholder { color: #444; }
        .btn-login {
            width: 100%;
            height: 48px;
            background: #CE0000;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #ff0000; }
        .error-msg {
            background: rgba(204,0,0,0.15);
            border: 1px solid #cc0000;
            border-radius: 8px;
            padding: 11px 16px;
            color: #ff9999;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 22px;
            font-size: 12px;
            color: #555;
            text-decoration: none;
            font-weight: 700;
        }
        .back-link:hover { color: #CE0000; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">TICK.<span>IT</span></div>
        <div class="login-sub">Admin Panel</div>

        {% if error %}
        <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Enter admin username" autofocus required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">🔐 Login to Admin</button>
        </form>

        <a href="/" class="back-link">← Back to main site</a>
    </div>
</body>
</html>
